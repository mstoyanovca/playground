<div class="container-md" xmlns="http://www.w3.org/1999/html">
    <form #loginForm="ngForm" class="mt-3">
        <fieldset>
            <legend>PLease enter your credentials:</legend>
            <div class="row">
                <div class="col-lg-6 col-md-12" style="min-width: 576px">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" [(ngModel)]="user.email" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" [(ngModel)]="user.password" class="form-control form-control-sm" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm" [disabled]="!loginForm.form.valid">Login</button>
                </div>
            </div>
        </fieldset>
    </form>
</div>
